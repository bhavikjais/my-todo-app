<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>// TASKS</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0e14">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
  :root {
    --bg: #0a0e14;
    --panel: #10151f;
    --panel-2: #151b28;
    --border: #1f2836;
    --text: #d6e0f0;
    --text-dim: #6b7893;
    --accent: #39ff9d;
    --accent-2: #00d4ff;
    --danger: #ff4d6d;
    --font: 'Consolas', 'SF Mono', 'Fira Code', monospace;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    background:
      radial-gradient(circle at 20% 0%, rgba(57,255,157,0.06), transparent 40%),
      radial-gradient(circle at 80% 100%, rgba(0,212,255,0.06), transparent 40%),
      var(--bg);
    color: var(--text);
    font-family: var(--font);
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 60px 20px;
  }

  .app {
    width: 100%;
    max-width: 560px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    box-shadow: 0 0 0 1px rgba(57,255,157,0.03), 0 20px 60px rgba(0,0,0,0.5);
    overflow: hidden;
  }

  .titlebar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 14px 16px;
    background: var(--panel-2);
    border-bottom: 1px solid var(--border);
  }

  .dot { width: 11px; height: 11px; border-radius: 50%; }
  .dot.r { background: #ff5f56; }
  .dot.y { background: #ffbd2e; }
  .dot.g { background: #27c93f; }

  .titlebar span.label {
    margin-left: 10px;
    color: var(--text-dim);
    font-size: 12px;
    letter-spacing: 1px;
  }

  header {
    padding: 24px 24px 10px;
  }

  h1 {
    margin: 0 0 4px;
    font-size: 20px;
    color: var(--accent);
    letter-spacing: 1px;
  }
  h1::before { content: "> "; color: var(--text-dim); }

  .subtitle {
    color: var(--text-dim);
    font-size: 12px;
    margin-bottom: 4px;
  }

  .stats {
    display: flex;
    gap: 16px;
    padding: 0 24px 16px;
    font-size: 12px;
    color: var(--text-dim);
  }
  .stats b { color: var(--accent-2); }

  form {
    display: flex;
    gap: 8px;
    padding: 0 24px 20px;
  }

  input[type="text"] {
    flex: 1;
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 14px;
    border-radius: 6px;
    font-family: var(--font);
    font-size: 14px;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  input[type="text"]::placeholder { color: var(--text-dim); }
  input[type="text"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(57,255,157,0.12);
  }

  button.add-btn {
    background: var(--accent);
    color: #06140c;
    border: none;
    padding: 0 20px;
    border-radius: 6px;
    font-family: var(--font);
    font-weight: bold;
    font-size: 14px;
    cursor: pointer;
    transition: filter 0.15s, transform 0.1s;
  }
  button.add-btn:hover { filter: brightness(1.1); }
  button.add-btn:active { transform: scale(0.97); }

  .filters {
    display: flex;
    gap: 6px;
    padding: 0 24px 16px;
  }

  .filter-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 6px 12px;
    border-radius: 20px;
    font-family: var(--font);
    font-size: 11px;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: all 0.15s;
  }
  .filter-btn.active {
    border-color: var(--accent-2);
    color: var(--accent-2);
    background: rgba(0,212,255,0.08);
  }
  .filter-btn:hover:not(.active) { border-color: var(--text-dim); color: var(--text); }

  ul.task-list {
    list-style: none;
    margin: 0;
    padding: 0 12px 12px;
    max-height: 420px;
    overflow-y: auto;
  }

  .task {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px;
    border-radius: 6px;
    transition: background 0.15s;
    animation: slideIn 0.2s ease;
  }
  .task:hover { background: var(--panel-2); }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .checkbox {
    width: 18px;
    height: 18px;
    flex-shrink: 0;
    border: 1.5px solid var(--text-dim);
    border-radius: 4px;
    cursor: pointer;
    position: relative;
    transition: border-color 0.15s, background 0.15s;
  }
  .checkbox.checked {
    background: var(--accent);
    border-color: var(--accent);
  }
  .checkbox.checked::after {
    content: "";
    position: absolute;
    left: 5px;
    top: 1px;
    width: 5px;
    height: 9px;
    border: solid #06140c;
    border-width: 0 2px 2px 0;
    transform: rotate(45deg);
  }

  .task-text {
    flex: 1;
    font-size: 14px;
    word-break: break-word;
    cursor: default;
  }
  .task.done .task-text {
    color: var(--text-dim);
    text-decoration: line-through;
  }

  .delete-btn {
    background: transparent;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 16px;
    padding: 4px 6px;
    border-radius: 4px;
    opacity: 0;
    transition: opacity 0.15s, color 0.15s;
  }
  .task:hover .delete-btn { opacity: 1; }
  .delete-btn:hover { color: var(--danger); }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-dim);
    font-size: 13px;
  }
  .empty-state .cursor {
    display: inline-block;
    width: 8px;
    height: 14px;
    background: var(--accent);
    margin-left: 4px;
    animation: blink 1s step-end infinite;
    vertical-align: middle;
  }
  @keyframes blink { 50% { opacity: 0; } }

  footer {
    padding: 14px 24px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 11px;
    color: var(--text-dim);
  }

  .clear-btn {
    background: transparent;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-family: var(--font);
    font-size: 11px;
    text-decoration: underline;
    text-underline-offset: 3px;
  }
  .clear-btn:hover { color: var(--danger); }

  ul.task-list::-webkit-scrollbar { width: 8px; }
  ul.task-list::-webkit-scrollbar-track { background: transparent; }
  ul.task-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>

<div class="app">
  <div class="titlebar">
    <div class="dot r"></div>
    <div class="dot y"></div>
    <div class="dot g"></div>
    <span class="label">tasks.exe</span>
  </div>

  <header>
    <h1>TASKS</h1>
    <div class="subtitle">a self-contained task list // stored locally in this browser</div>
  </header>

  <div class="stats">
    <span><b id="stat-total">0</b> total</span>
    <span><b id="stat-active">0</b> active</span>
    <span><b id="stat-done">0</b> done</span>
  </div>

  <form id="task-form">
    <input type="text" id="task-input" placeholder="add a new task and hit enter..." autocomplete="off" maxlength="200" />
    <button type="submit" class="add-btn">ADD</button>
  </form>

  <div class="filters">
    <button class="filter-btn active" data-filter="all">ALL</button>
    <button class="filter-btn" data-filter="active">ACTIVE</button>
    <button class="filter-btn" data-filter="done">DONE</button>
  </div>

  <ul class="task-list" id="task-list"></ul>

  <footer>
    <span id="footer-hint">click a task to toggle it complete</span>
    <button class="clear-btn" id="clear-done">clear completed</button>
  </footer>
</div>

<script>
(function () {
  const STORAGE_KEY = 'tasks-app-v1';
  let tasks = load();
  let filter = 'all';

  const form = document.getElementById('task-form');
  const input = document.getElementById('task-input');
  const list = document.getElementById('task-list');
  const filterBtns = document.querySelectorAll('.filter-btn');
  const clearBtn = document.getElementById('clear-done');
  const statTotal = document.getElementById('stat-total');
  const statActive = document.getElementById('stat-active');
  const statDone = document.getElementById('stat-done');

  function load() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : [];
    } catch (e) {
      return [];
    }
  }

  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
  }

  function uid() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function render() {
    const filtered = tasks.filter(t => {
      if (filter === 'active') return !t.done;
      if (filter === 'done') return t.done;
      return true;
    });

    list.innerHTML = '';

    if (filtered.length === 0) {
      const empty = document.createElement('li');
      empty.className = 'empty-state';
      const msg = tasks.length === 0
        ? 'no tasks yet'
        : `no ${filter} tasks`;
      empty.innerHTML = `${msg}<span class="cursor"></span>`;
      list.appendChild(empty);
    } else {
      filtered.forEach(t => {
        const li = document.createElement('li');
        li.className = 'task' + (t.done ? ' done' : '');
        li.dataset.id = t.id;
        li.innerHTML = `
          <div class="checkbox ${t.done ? 'checked' : ''}" title="toggle complete"></div>
          <div class="task-text">${escapeHtml(t.text)}</div>
          <button class="delete-btn" title="delete">✕</button>
        `;
        list.appendChild(li);
      });
    }

    statTotal.textContent = tasks.length;
    statActive.textContent = tasks.filter(t => !t.done).length;
    statDone.textContent = tasks.filter(t => t.done).length;
  }

  form.addEventListener('submit', e => {
    e.preventDefault();
    const text = input.value.trim();
    if (!text) return;
    tasks.unshift({ id: uid(), text, done: false });
    input.value = '';
    save();
    render();
  });

  list.addEventListener('click', e => {
    const li = e.target.closest('.task');
    if (!li) return;
    const id = li.dataset.id;

    if (e.target.classList.contains('delete-btn')) {
      tasks = tasks.filter(t => t.id !== id);
      save();
      render();
      return;
    }

    if (e.target.classList.contains('checkbox') || e.target.classList.contains('task-text')) {
      const t = tasks.find(t => t.id === id);
      if (t) t.done = !t.done;
      save();
      render();
    }
  });

  filterBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      filterBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      filter = btn.dataset.filter;
      render();
    });
  });

  clearBtn.addEventListener('click', () => {
    tasks = tasks.filter(t => !t.done);
    save();
    render();
  });

  render();
})();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>

</body>
</html>
